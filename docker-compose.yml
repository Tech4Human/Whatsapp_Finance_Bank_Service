services:
  mock-bank:
    image: ruby-mock-bank:latest
    container_name: mock-bank
    ports:
      - "4000:4000"
    env_file:
      - .env.docker
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s